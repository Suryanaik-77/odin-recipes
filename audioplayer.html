<!doctype html>
	<head>
		<title>HTML/CSS Modern Music Player</title>
		<style>
			body {
				background-color: #F9F9F9;
			}
			audio {
				width: 100%;
			}

			audio::-webkit-media-controls-time-remaining-display, audio::-webkit-media-controls-current-time-display
			{
				font-size: 12px;
			}
            audio::-webkit-media-controls-play-button{
                background-color:#8FE1A2;
                border-radius: 15px;
            }
            audio::-webkit-media-controls-mute-button{
                background-color:#D6D1F5;
                border-radius:15px;
            }

			.player-box {
				width: 300px;
				box-shadow: 2px 3px 2px 1px #ccc;
				border-radius: 10px;
				padding: 10px;
				background-color: white;
			}

			#track-img {
				width: 300px;
				height:auto;
				margin-bottom: 10px;
				border-radius: 5px;
			}
		</style>
	</head>
	<body>
		<div class="player-box">
			<div class="player-img">
				<img src="https://bit.ly/3AteiOL" id="track-img"/>
			</div>
			<div class="player-controls">
				<audio src= "https://bit.ly/3v8yOn2" controls>Your browser does not support the audio element.</audio>
			</div>
		</div>
	</body>
</html>
